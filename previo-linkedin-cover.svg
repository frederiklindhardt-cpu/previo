<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C1018"/>
      <stop offset="100%" stop-color="#131922"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(13,148,136,0.10)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#glow)"/>

  <!-- Subtle top accent line -->
  <rect x="0" y="0" width="1584" height="2" fill="url(#accent)" opacity="0.4"/>

  <!-- Tagline -->
  <text x="120" y="170"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="48"
        fill="#F1F3F7"
        letter-spacing="0.5">Know who you're putting</text>
  <text x="120" y="230"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="48"
        fill="#F1F3F7"
        letter-spacing="0.5">your <tspan fill="#0D9488">name</tspan> behind.</text>

  <!-- Subtitle -->
  <text x="120" y="290"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="20"
        fill="#8B95A8"
        letter-spacing="0.3">Automated pre-employment screening for regulated industries</text>

  <!-- Website -->
  <text x="120" y="340"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="16"
        fill="#0D9488"
        letter-spacing="1">previo-group.com</text>

  <!-- P mark on right side -->
  <g transform="translate(1250, 98) scale(0.5)">
    <rect x="104" y="80" width="48" height="240" rx="24" fill="url(#accent)" opacity="0.12"/>
    <path d="M 128 80
             C 128 80, 240 58, 290 110
             C 330 150, 326 210, 280 244
             C 250 264, 195 266, 150 264
             L 150 220
             C 185 222, 240 218, 264 194
             C 282 174, 280 146, 264 130
             C 240 108, 180 112, 152 122
             L 128 122
             Z" fill="url(#accent)" opacity="0.12"/>
  </g>
</svg>
