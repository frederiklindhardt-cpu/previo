<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previo Group — Know Before You Hire</title>
    <meta name="description" content="Automated pre-employment screening for regulated firms. Adverse media, sanctions checks, and employment verification. One auditable score.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0e17;
            --bg-elevated: #111827;
            --text-primary: #e8ecf4;
            --text-secondary: #7a8ba8;
            --text-muted: #4a5568;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --accent-subtle: rgba(56, 189, 248, 0.08);
            --border: rgba(255, 255, 255, 0.06);
            --success: #34d399;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Grain overlay --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* --- Ambient glow --- */
        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.07;
            pointer-events: none;
            z-index: 0;
        }
        .glow--1 { background: var(--accent); top: -200px; right: -100px; }
        .glow--2 { background: #6366f1; bottom: -200px; left: -200px; opacity: 0.05; }

        /* --- Navigation --- */
        nav {
            position: relative;
            z-index: 100;
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }

        nav a.nav-link {
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-decoration: none;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        nav a.nav-link:hover { color: var(--text-primary); }

        /* --- Main --- */
        main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem 2rem 4rem;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(3rem, 6.5vw, 5rem);
            line-height: 1.08;
            letter-spacing: -0.03em;
            font-weight: 400;
            max-width: 820px;
            margin-bottom: 1.5rem;
            animation: fadeUp 0.8s ease both;
        }
        h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .subtext {
            font-size: 1.05rem;
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 2.75rem;
            animation: fadeUp 0.8s ease 0.1s both;
        }

        /* --- Form --- */
        .form-wrap {
            width: 100%;
            max-width: 440px;
            animation: fadeUp 0.8s ease 0.2s both;
        }

        .email-form {
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .email-form:focus-within {
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .email-form input {
            flex: 1;
            padding: 1rem 1.25rem;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }
        .email-form input::placeholder { color: var(--text-muted); }

        .email-form button {
            padding: 1rem 1.5rem;
            border: none;
            background: var(--accent);
            color: var(--bg);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .email-form button:hover { background: #5cc8fa; }

        .form-success {
            display: none;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(52, 211, 153, 0.2);
            background: rgba(52, 211, 153, 0.05);
            color: var(--success);
            font-size: 0.9rem;
            text-align: center;
        }

        .trust {
            margin-top: 1.25rem;
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }
        .trust span {
            margin: 0 0.4rem;
            opacity: 0.4;
        }

        /* --- Footer --- */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 1.5rem 2rem;
        }
        footer p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        footer a:hover { color: var(--text-secondary); }

        /* --- Animations --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            nav { padding: 1.25rem 1.5rem; }
            .email-form { flex-direction: column; }
            .email-form button { padding: 0.9rem; }
            .trust { font-size: 0.72rem; }
        }
    </style>
</head>
<body>

<div class="glow glow--1"></div>
<div class="glow glow--2"></div>

<nav>
    <a href="/" class="logo">Previo<span>.</span></a>
    <a href="mailto:hello@previo-group.com" class="nav-link">Contact</a>
</nav>

<main>
    <h1>Know who you hire <em>before</em> you hire them</h1>

    <p class="subtext">Pre-employment screening for regulated firms, political parties, and professional services.</p>

    <div class="form-wrap">
        <form class="email-form" id="waitlistForm" action="https://formspree.io/f/xojpdrgr" method="POST">
            <input type="email" name="email" placeholder="Your work email" required autocomplete="email" />
            <button type="submit">Request Early Access</button>
        </form>
        <div class="form-success" id="formSuccess">
            You're on the list. We'll be in touch.
        </div>
        <p class="trust">UK &amp; EU employers <span>·</span> FCA-regulated environments <span>·</span> GDPR compliant</p>
    </div>
</main>

<footer>
    <p>&copy; 2026 Previo Group &middot; <a href="mailto:hello@previo-group.com">hello@previo-group.com</a></p>
</footer>

<script>
    document.getElementById('waitlistForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const form = this;
        const btn = form.querySelector('button');
        btn.textContent = 'Submitting…';
        btn.disabled = true;

        try {
            const res = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });

            if (res.ok) {
                form.style.display = 'none';
                document.getElementById('formSuccess').style.display = 'block';
                document.querySelector('.trust').style.display = 'none';
            } else {
                btn.textContent = 'Request Early Access';
                btn.disabled = false;
                alert('Something went wrong. Please try again or email hello@previo-group.com');
            }
        } catch {
            btn.textContent = 'Request Early Access';
            btn.disabled = false;
            alert('Something went wrong. Please try again or email hello@previo-group.com');
        }
    });
</script>

</body>
</html>
